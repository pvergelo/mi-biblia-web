<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consejero Bíblico RV1960 + Inteligencia NotebookLM</title>
    <style>
        :root { --primary: #2e7d32; --accent: #1565c0; --notebook: #673ab7; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 850px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h1 { color: var(--primary); text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 0.9em; }

        /* Sección NotebookLM */
        .notebook-box { 
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            border: 2px solid var(--notebook);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .btn-notebook { 
            background: var(--notebook); color: white; border: none; padding: 12px 25px; 
            border-radius: 30px; cursor: pointer; font-weight: bold; text-decoration: none;
            display: inline-flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .btn-notebook:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(103, 58, 183, 0.3); }

        /* Botones de Temas */
        .tags-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; margin-bottom: 25px; background: #fafafa; padding: 20px; border-radius: 15px;
        }
        .tag-btn { 
            background: white; border: 1px solid #ddd; padding: 12px; border-radius: 10px; 
            cursor: pointer; font-size: 14px; transition: 0.3s; text-align: center;
        }
        .tag-btn.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: bold; }

        .btn-main { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-bottom: 20px; }
        
        .result-card { background: white; border-top: 6px solid var(--primary); padding: 25px; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); animation: slideUp 0.4s ease-out; }
        .ref { font-weight: bold; color: var(--primary); font-size: 1.3em; display: block; }
        .text { line-height: 1.8; color: #333; font-style: italic; background: #fdfdfd; padding: 15px; border-radius: 8px; margin-top: 10px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>📖 Consejero Bíblico RV1960</h1>
    <p class="subtitle">Guía espiritual basada en la Biblia y NotebookLM</p>

    <div class="notebook-box">
        <h3 style="color: var(--notebook); margin-top: 0;">🧠 ¿Necesitas un estudio más profundo?</h3>
        <p style="font-size: 0.9em; color: #555;">Accede a mi cuaderno interactivo donde la IA te ayudará a analizar mis notas y la Biblia a fondo.</p>
        <a href="https://notebooklm.google.com/notebook/c060a20f-981c-4bc5-9d6b-f579c65bb6fa" target="_blank" class="btn-notebook">
            📘 ABRIR NOTEBOOKLM INTERACTIVO
        </a>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 25px;">

    <div class="tags-container" id="grid"></div>
    <button class="btn-main" onclick="mostrarConsejos()">OBTENER GUÍA RÁPIDA</button>
    <div id="resultados"></div>
</div>

<script>
    const datos = [
        { id: "hogar", label: "🏠 Hogar", ref: "Josué 24:15", texto: "Y si mal os parece servir a Jehová, escogeos hoy a quién sirváis... pero yo y mi casa serviremos a Jehová." },
        { id: "ansiedad", label: "🧘 Ansiedad", ref: "Filipenses 4:6-7", texto: "Por nada estéis afanosos, sino sean conocidas vuestras peticiones delante de Dios en toda oración y ruego, con acción de gracias." },
        { id: "finanzas", label: "💰 Finanzas", ref: "Mateo 6:33", texto: "Mas buscad primeramente el reino de Dios y su justicia, y todas estas cosas os serán añadidas." },
        { id: "miedo", label: "🛡️ Miedo", ref: "Isaías 41:10", texto: "No temas, porque yo estoy contigo; no desmayes, porque yo soy tu Dios que te esfuerzo." },
        { id: "salud", label: "🏥 Salud", ref: "Salmos 103:2-3", texto: "Bendice, alma mía, a Jehová... El es quien perdona todas tus iniquidades, el que sana todas tus dolencias." },
        { id: "perdon", label: "🤝 Perdón", ref: "Efesios 4:32", texto: "Antes sed benignos unos con otros... perdonándoos unos a otros, como Dios también os perdonó a vosotros en Cristo." },
        { id: "paz", label: "🕊️ Paz", ref: "Juan 14:27", texto: "La paz os dejo, mi paz os doy; yo no os la doy como el mundo la da." },
        { id: "esperanza", label: "⚓ Esperanza", ref: "Jeremías 29:11", texto: "Porque yo sé los pensamientos que tengo acerca de vosotros... pensamientos de paz, y no de mal." }
    ];

    let seleccionados = new Set();

    function cargarBotones() {
        const grid = document.getElementById('grid');
        datos.forEach(tema => {
            const btn = document.createElement('button');
            btn.className = 'tag-btn';
            btn.innerText = tema.label;
            btn.onclick = () => {
                if(seleccionados.has(tema.id)) {
                    seleccionados.delete(tema.id);
                    btn.classList.remove('active');
                } else {
                    seleccionados.add(tema.id);
                    btn.classList.add('active');
                }
            }
            grid.appendChild(btn);
        });
    }

    function mostrarConsejos() {
        const contenedor = document.getElementById('resultados');
        contenedor.innerHTML = "";
        if(seleccionados.size === 0) return alert("Selecciona un tema.");

        seleccionados.forEach(id => {
            const item = datos.find(d => d.id === id);
            contenedor.innerHTML += `
                <div class="result-card">
                    <span class="ref">📍 ${item.ref}</span>
                    <div class="text">"${item.texto}"</div>
                </div>`;
        });
    }

    cargarBotones();
</script>
</body>
</html>
