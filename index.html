<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consejero Bíblico RV1960 - V3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --primary: #2e7d32; --accent: #1565c0; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 800px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; }
        .tags-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; background: #fafafa; padding: 15px; border-radius: 15px; }
        .tag-btn { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .tag-btn.active { background: var(--primary); color: white; font-weight: bold; }
        .btn-search { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .card-result { background: white; border-left: 6px solid var(--primary); padding: 20px; margin-top: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .ref-header { font-weight: bold; color: var(--primary); font-size: 1.2em; margin-bottom: 10px; display: block; }
        .verse-text { line-height: 1.6; color: #333; font-style: italic; white-space: pre-wrap; }
        #status { text-align: center; font-weight: bold; margin: 15px 0; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>🙏 Consejero Bíblico RV1960</h1>
    <div id="status">Cargando Biblia...</div>
    <div class="tags-container" id="panelTemas"></div>
    <button class="btn-search" id="btnRun" onclick="buscarTemas()" disabled>BUSCAR CONSEJO</button>
    <div id="resultados"></div>
</div>

<script>
    const pdfUrl = 'Santa-Biblia-RV1960-ES.pdf';
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pdfDoc = null;
    let seleccionados = new Set();

    // Diccionario con 20 temas estratégicos
    const diccionario = [
        { id: "hogar", label: "🏠 Hogar", buscar: "Génesis 2", consejo: "Dios instituyó la familia desde el principio." },
        { id: "paz", label: "🕊️ Paz", buscar: "Juan 14", consejo: "La paz de Jesús sobrepasa todo entendimiento." },
        { id: "miedo", label: "🛡️ Miedo", buscar: "Isaías 41", consejo: "No temas, porque Dios está contigo." },
        { id: "ansiedad", label: "🧘 Ansiedad", buscar: "Filipenses 4", consejo: "Presenta tus peticiones a Dios con gratitud." },
        { id: "fe", label: "✨ Fe", buscar: "Hebreos 11", consejo: "La fe es la convicción de lo que no se ve." },
        { id: "amor", label: "❤️ Amor", buscar: "1 Corintios 13", consejo: "El amor es la mayor de las virtudes." },
        { id: "perdon", label: "🤝 Perdón", buscar: "Mateo 18", consejo: "Debemos perdonar hasta setenta veces siete." },
        { id: "fortaleza", label: "💪 Fortaleza", buscar: "Salmos 27", consejo: "Jehová es la fortaleza de mi vida." },
        { id: "salud", label: "🏥 Salud", buscar: "Éxodo 15", consejo: "Yo soy Jehová tu sanador." },
        { id: "sabiduria", label: "💡 Sabiduría", buscar: "Proverbios 3", consejo: "Fíate de Jehová y no en tu propia prudencia." },
        { id: "esperanza", label: "⚓ Esperanza", buscar: "Jeremías 29", consejo: "Planes de bienestar y no de mal." },
        { id: "tristeza", label: "😢 Tristeza", buscar: "Salmos 34", consejo: "Cercano está Jehová a los quebrantados." },
        { id: "trabajo", label: "🛠️ Trabajo", buscar: "Colosenses 3", consejo: "Hacedlo todo como para el Señor." },
        { id: "finanzas", label: "💰 Finanzas", buscar: "Filipenses 4:19", consejo: "Dios suplirá todo lo que os falte." },
        { id: "tentacion", label: "🚫 Tentación", buscar: "1 Corintios 10", consejo: "Fiel es Dios, que no os dejará ser tentados más de lo que podéis." },
        { id: "hijos", label: "👶 Hijos", buscar: "Salmos 127", consejo: "Herencia de Jehová son los hijos." },
        { id: "paciencia", label: "⏳ Paciencia", buscar: "Salmos 40", consejo: "Pacientemente esperé a Jehová." },
        { id: "enojo", label: "🔥 Enojo", buscar: "Efesios 4", consejo: "Airaos, pero no pequéis." },
        { id: "soledad", label: "🚶 Soledad", buscar: "Salmos 23", consejo: "Aunque ande en valle de sombra, estarás conmigo." },
        { id: "futuro", label: "🚀 Futuro", buscar: "Proverbios 16", consejo: "Encomienda a Jehová tus obras y tus pensamientos serán afirmados." }
    ];

    // Cargar PDF
    pdfjsLib.getDocument(pdfUrl).promise.then(doc => {
        pdfDoc = doc;
        document.getElementById('status').innerText = "✅ Biblia Lista. Selecciona temas.";
        document.getElementById('btnRun').disabled = false;
        const panel = document.getElementById('panelTemas');
        diccionario.forEach(t => {
            const b = document.createElement('button');
            b.className = 'tag-btn';
            b.innerText = t.label;
            b.onclick = () => {
                if(seleccionados.has(t.id)) { seleccionados.delete(t.id); b.classList.remove('active'); }
                else { seleccionados.add(t.id); b.classList.add('active'); }
            };
            panel.appendChild(b);
        });
    }).catch(e => { document.getElementById('status').innerText = "❌ No se encontró el PDF."; });

    async function buscarTemas() {
        const contenedor = document.getElementById('resultados');
        const status = document.getElementById('status');
        contenedor.innerHTML = "";
        if (seleccionados.size === 0) return alert("Selecciona un tema");

        status.innerText = "🔍 Buscando... esto puede tomar 5-10 segundos.";

        for (let id of seleccionados) {
            const info = diccionario.find(x => x.id === id);
            let encontrado = false;

            // Buscamos en todas las páginas
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const content = await page.getTextContent();
                const rawText = content.items.map(s => s.str).join(" ");
                
                // Normalizamos el texto (quitamos espacios extras y pasamos a mayúsculas)
                const cleanText = rawText.replace(/\s+/g, ' ').toUpperCase();
                const query = info.buscar.toUpperCase();

                if (cleanText.includes(query)) {
                    encontrado = true;
                    const pos = cleanText.indexOf(query);
                    const fragmento = rawText.substring(pos, pos + 500); // Usamos texto original para mostrarlo bonito

                    contenedor.innerHTML += `
                        <div class="card-result">
                            <span class="ref-header">📖 ${info.buscar} (${info.label})</span>
                            <div class="verse-text">"${fragmento}..."</div>
                            <div style="margin-top:10px; color:#1565c0">💡 <b>Nota:</b> ${info.consejo}</div>
                        </div>
                    `;
                    break; // Pasa al siguiente tema seleccionado
                }
            }
            if(!encontrado) {
                contenedor.innerHTML += `<p style="color:red">⚠️ No se encontró texto para: ${info.label} (Prueba otro tema)</p>`;
            }
        }
        status.innerText = "✅ Búsqueda terminada.";
    }
</script>

</body>
</html>
